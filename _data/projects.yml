  - name: Assignments
    items:
      - title: Chainlink CRE Price Snapshot
        date: 2 days · May 2026
        description: A Chainlink Runtime Environment (CRE) workflow that reads token prices from Chainlink Data Feeds on Sepolia and writes verified on-chain snapshots in a single HTTP-triggered execution.
        github: https://github.com/dhru7777/Chainlink-Assignment-CRE

  - name: Ongoing Projects
    items:
      - title: ACP Demo — Agentic Commerce
        date: Ongoing · 2026
        description: A Nike-themed buyer–seller demo where two AI agents negotiate offers over ACP, settle with x402 USDC or Stripe, and verify seller identity on-chain via ERC-8004 — a seven-day public build from handshake to real payment.
        github: https://github.com/dhru7777/ACP-demo
        demo: https://dheeraj-acp-demo.netlify.app/

  - name: Completed Projects
    items:
      - title: Collisions
        date: 2025
        description: Built to turn casual meals at NYU Bobst Library into intentional meetups where students collide over ideas and build real friendships. A Next.js and Firebase app lets verified hosts create discussion tables—with topic, location, time slot, and seat limits—while others browse and join open seats.
        github: https://github.com/dhru7777/collisions
        demo: https://collisions-phi.vercel.app/

      - title: MEV Shield
        date: 2025
        description: A Cloudflare Worker that protects crypto transactions from MEV (Maximal Extractable Value) attacks by routing them through private relays instead of the public mempool.
        github: https://github.com/dhru7777/mev-shield
        demo: https://mev-shield.mev-shield.workers.dev/

      - title: Audio Journal Tool
        date: 2024 - 2025
        description: Built to make journaling frictionless by letting you capture ideas through voice instead of typing. The tool transcribes speech in real time, stores raw notes, and can turn transcripts into formatted blog posts for Medium.
        github: https://github.com/dheerajmaske7/audio_journal_tool

      - title: Analytics Engine for Measuring Trading Outcomes of Alerts
        date: Jun 2025 - Aug 2025
        description: An application that allows people to test the performance of their trading strategy on a given set of entry points in stocks for a particular time stamp.
        demo: https://flourishing-brigadeiros-1a8602.netlify.app/

      - title: Net Hourly Rate Calculator
        date: Oct 2024
        description: Tool to calculate net hourly income after federal, state, & city taxes in cities like New York & San Francisco.
        demo: https://net-hourly-rate-after-taxes-in-nyc-and-sf-w6eet8huyttfjoz7mwb2.streamlit.app/

      - title: Custom Cursor Plugin Extension
        date: Nov 2024
        description: A Chrome extension that allows users to upload custom images as cursors.
        github: https://github.com/dheerajmaske7/plugin_cursor

      - title: AI-Assisted Solidity Code Auditor
        date: Jun 2024 - Jul 2024
        description: Developed an automated auditing tool for smart contracts which are based on solidity language.
        demo: https://auditagent.nethermind.io/

      - title: Technical Writer Assistant Tool
        date: Jun 2024 - Jul 2024
        description: Built a tool that generates detailed technical documentation from code snippets using APIs like Anthropic.
        github: https://github.com/dheerajmaske7/Technical-writer-assistant

      - title: Volume Surge Detection and Trade Execution Bot
        date: Jun 2024
        description: Created a trading bot to detect volume surges in cryptocurrency markets and execute automated trades.
        github: https://github.com/dheerajmaske7/MEV-BOT/blob/main/main.py

      - title: Post-Quantum Cryptography Migration
        date: Sep 2023 - Nov 2023
        description: "Research: Integrated TLS 1.3 and libOQS to develop a library for secure quantum-enabled applications."

      - title: Elliptic Curve Cryptography for Space Navigation
        date: Jun 2023 - Jul 2023
        description: "Research: Proposed a robust ECC-based system to enhance secure communications for space navigation."

      - title: Hashing Using Various Algorithms
